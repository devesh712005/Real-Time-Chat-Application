name: CI/CD Deploy Real-Time Chat App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          timeout: 30m # ✅ ADD THIS
          command_timeout: 30m
          script: |
            set -e

            cd /home/ubuntu

            # Clone if not exists
            if [ ! -d "Real-Time-Chat-Application" ]; then
              git clone https://github.com/devesh712005/Real-Time-Chat-Application.git
            fi

            cd Real-Time-Chat-Application

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Stop old containers
            docker-compose down --remove-orphans || true

            # Clean only unused stuff (safe)
            docker system prune -f

            # Build & start
            docker-compose build
            docker-compose up -d

            # Show running containers
            docker ps
